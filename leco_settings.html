<!DOCTYPE html>
<html>
<body>

<h2 class="centered-heading">Settings</h2>

Text Color:
<input type="color" id="text" value="#000000">

<br><br>

Background Color:
<input type="color" id="bg" value="#ffffff">

<br><br>
  
<label>
  <input type="checkbox" id="invert">
  Invert every minute
</label>

<br><br>

<div style="text-align:center;">
  <button onclick="save()">Save</button>
</div>
  
<script>

function save() {

var settings = {

text_color:
document.getElementById("text").value,

background_color:
document.getElementById("bg").value

invert_every_minute:
    document.getElementById("invert").checked ? 1 : 0  

};


location.href =
"pebblejs://close#" +
encodeURIComponent(
JSON.stringify(settings));

}

</script>

</body>
</html>

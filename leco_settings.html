<!DOCTYPE html>
<html>
<body>

<h2 class="centered-heading">Settings</h2>

Text Color:
<input type="color" id="text">

<br><br>

Background Color:
<input type="color" id="bg">

<br><br>

Second Values: 
1 → every second (warning: high battery usage)
60 → every minute
3600 → every hour
86400 → every day
  
<label>
  Invert interval (seconds):
  <input type="number" id="invert_seconds" min="1" max="86400">
</label>

<br><br>

<div style="text-align:center;">
  <button
    onclick="save()"
    style="
      font-size:22px;
      padding:12px 36px;
      min-width:180px;
      min-height:60px;
      border-radius:10px;
      cursor:pointer;
    ">
    Save
  </button>
</div>

<script>

function setDefaults() {
  document.getElementById("text").value = "#000000";
  document.getElementById("bg").value = "#ffffff";
  document.getElementById("invert_seconds").value = 60;
}

window.onload = function() {

  var hash = window.location.hash.substring(1);

  if (hash) {

    try {

      var settings = JSON.parse(
        decodeURIComponent(hash)
      );

      document.getElementById("text").value =
        settings.text_color || "#000000";

      document.getElementById("bg").value =
        settings.background_color || "#ffffff";

      document.getElementById("invert_seconds").value =
        settings.invert_interval || 60;

    } catch (e) {

      console.log("Could not load settings");
      setDefaults();

    }

  } else {

    setDefaults();

  }

};


function save() {

  var interval =
    parseInt(
      document.getElementById("invert_seconds").value,
      10
    );

  if (isNaN(interval) || interval < 1) {
    interval = 60;
  }

  if (interval > 86400) {
    interval = 86400;
  }

  var settings = {

    text_color:
      document.getElementById("text").value,

    background_color:
      document.getElementById("bg").value,

    invert_interval:
      interval

  };

  location.href =
    "pebblejs://close#" +
    encodeURIComponent(
      JSON.stringify(settings)
    );

}

</script>

</body>
</html>

```html
<!DOCTYPE html>
<html>
<body>

<h2 class="centered-heading">Settings</h2>

Text Color:
<input type="color" id="text">

<br><br>

Background Color:
<input type="color" id="bg">

<br><br>

<label>
  Invert interval (seconds):
  <input type="number" id="invert_seconds" min="1" max="86400" value="60">
</label>

<br><br>

<div style="text-align:center;">
  <button onclick="save()">Save</button>
</div>

<script>

window.onload = function() {

  var saved = localStorage.getItem("settings");

  if (saved) {
    try {
      var settings = JSON.parse(saved);

      document.getElementById("text").value =
        settings.text_color || "#000000";

      document.getElementById("bg").value =
        settings.background_color || "#ffffff";

document.getElementById("invert_seconds").value =
  settings.invert_interval || 60;

    } catch(e) {
      setDefaults();
    }

  } else {
    setDefaults();
  }

};


function setDefaults() {
  document.getElementById("text").value = "#000000";
  document.getElementById("bg").value = "#ffffff";
  document.getElementById("invert").checked = false;
}


function save() {

  var interval =
    parseInt(
      document.getElementById("invert_seconds").value
    );


  if (!interval || interval < 1) {
    interval = 60;
  }


  if (interval > 86400) {
    interval = 86400;
  }


  var settings = {

    text_color:
      document.getElementById("text").value,

    background_color:
      document.getElementById("bg").value,

    invert_interval:
      interval

  };


  location.href =
    "pebblejs://close#" +
    encodeURIComponent(
      JSON.stringify(settings)
    );

}

</script>

</body>
</html>
```

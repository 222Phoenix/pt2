<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="background:#DFF8EB; font-family:Arial, sans-serif; margin:0; padding:12px;">

<p>
  No more inverts. still small font, large font, bg, text color. no layout. add seconds color. 
</p>
<br><br>

<div style="margin-bottom:20px;">
  <label for="time_font">Time Font:</label><br>
  <select id="time_font" style="display:block;width:150px;height:40px;">
    <option value="0">Oxanium</option>
    <option value="1">Bebas</option>
    <option value="2">All Things</option>
    <option value="3">White Chalk</option>
  </select>
</div>
  
<div style="margin-bottom:20px;">
  <label for="font">Border Font:</label><br>
  <select id="font" style="display:block;width:150px;height:40px;">
      <option value="0">Bebas</option>
      <option value="1">Gothic</option>
      <option value="2">Roboto</option>
      <option value="3">Leco</option>
  </select>
</div>

<div style="margin-bottom:20px;">
  <label for="text">Text Color:</label><br>
  <input
    type="color"
    id="text"
    style="width:60px;height:40px;">
</div>

<div style="margin-bottom:20px;">
  <label for="bg">Background Color:</label><br>
  <input
    type="color"
    id="bg"
    style="width:60px;height:40px;">
</div>

  


<div style="margin-top:24px;">
  <button
    onclick="save()"
    style="
      width:100%;
      font-size:22px;
      padding:16px;
      border-radius:10px;
      cursor:pointer;">
    Save
  </button>
</div>

<script>

function setDefaults() {
  document.getElementById("time_font").value = "0";
  document.getElementById("font").value = "0";
  document.getElementById("text").value = "#000000";
  document.getElementById("bg").value = "#ffffff";
}

window.onload = function() {

  var hash = window.location.hash.substring(1);

  if (hash) {

    try {

      var settings = JSON.parse(
        decodeURIComponent(hash)
      );
      
      document.getElementById("font").value =
        (settings.font != null)
        ? settings.font
        : "1";
      
      document.getElementById("time_font").value =
        (settings.time_font != null)
        ? settings.time_font
        : "0";
      
      document.getElementById("text").value =
        settings.text_color || "#000000";

      document.getElementById("bg").value =
        settings.background_color || "#ffffff";
      

    } catch (e) {

      console.log("Could not load settings");
      setDefaults();

    }

  } else {

    setDefaults();

  }

};

function save() {
  

  if (interval > 86400) {
    interval = 86400;
  }

  var settings = {

    font: Number(document.getElementById("font").value),

    time_font: Number(document.getElementById("time_font").value),
    
    text_color:
      document.getElementById("text").value,

    background_color:
      document.getElementById("bg").value,

    invert_interval:
      interval

  };

  location.href =
    "pebblejs://close#" +
    encodeURIComponent(
      JSON.stringify(settings)
    );

}

</script>

</body>
</html>

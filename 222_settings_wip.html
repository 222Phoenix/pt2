<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="background:#DFF8EB; font-family:Arial, sans-serif; margin:0; padding:12px;">

<p>
  By default, this face switches text and background colors every minute unless you choose otherwise.
</p>
<br><br>

<div style="margin-bottom:20px;">
  <label for="font">Border Font:</label><br>
  <select id="font" style="display:block;width:150px;height:40px;">
      <option value="0">Gothic</option>
      <option value="1">Bebas</option>
      <option value="2">Roboto</option>
      <option value="3">Leco</option>
  </select>
</div>

<div style="margin-bottom:20px;">
  <label for="text">Text Color:</label><br>
  <input
    type="color"
    id="text"
    style="width:60px;height:40px;">
</div>

<div style="margin-bottom:20px;">
  <label for="bg">Background Color:</label><br>
  <input
    type="color"
    id="bg"
    style="width:60px;height:40px;">
</div>

  
<div style="margin-bottom:20px;">
  <label for="invert_seconds">
    Invert Interval (seconds):
  </label><br>

  <input
    type="number"
    id="invert_seconds"
    min="0"
    max="86400"
    step="1"
    value="60"
    style="width:120px;font-size:18px;padding:4px;">
</div>

<table
  border="1"
  cellpadding="6"
  cellspacing="0"
  style="margin:0 auto;border-collapse:collapse;">

  <thead>
    <tr>
      <th style="text-align:center; height:40px;">Seconds</th>
      <th style="text-align:left;">Behavior</th>
    </tr>
  </thead>

  <tbody>

    <tr>
      <td style="text-align:center; height:40px;">0</td>
      <td style="text-align:left;">
        Disable invert
      </td>
    </tr>

    <tr>
      <td style="text-align:center; height:40px;">1</td>
      <td style="text-align:left;">
        Invert every second<br>
        <small>(high battery usage)</small>
      </td>
    </tr>

    <tr>
      <td style="text-align:center; height:40px;">60</td>
      <td style="text-align:left;">
        Invert every minute<br>
        <small>(default)</small>
      </td>
    </tr>

    <tr>
      <td style="text-align:center; height:40px;">3600</td>
      <td style="text-align:left;">
        Invert every hour
      </td>
    </tr>

    <tr>
      <td style="text-align:center; height:40px;">86400</td>
      <td style="text-align:left;">
        Invert every 24 hours<br>
        <small>(maximum)</small>
      </td>
    </tr>

  </tbody>

</table>

<div style="margin-top:24px;">
  <button
    onclick="save()"
    style="
      width:100%;
      font-size:22px;
      padding:16px;
      border-radius:10px;
      cursor:pointer;">
    Save
  </button>
</div>

<script>

function setDefaults() {
  document.getElementById("font").value = "0";
  document.getElementById("text").value = "#000000";
  document.getElementById("bg").value = "#ffffff";
  document.getElementById("invert_seconds").value = 60;  
}

window.onload = function() {

  var hash = window.location.hash.substring(1);

  if (hash) {

    try {

      var settings = JSON.parse(
        decodeURIComponent(hash)
      );

      
      document.getElementById("font").value =
        (settings.font != null)
        ? settings.font
        : "1";
      
      document.getElementById("text").value =
        settings.text_color || "#000000";

      document.getElementById("bg").value =
        settings.background_color || "#ffffff";

      document.getElementById("invert_seconds").value =
        (settings.invert_interval != null)
          ? settings.invert_interval
          : 60;
      

    } catch (e) {

      console.log("Could not load settings");
      setDefaults();

    }

  } else {

    setDefaults();

  }

};

function save() {
  
  var interval =
    parseInt(
      document.getElementById("invert_seconds").value,
      10
    );

  if (isNaN(interval) || interval < 0) {
    interval = 60;
  }

  if (interval > 86400) {
    interval = 86400;
  }

  var settings = {

    font: Number(document.getElementById("font").value),
    
    text_color:
      document.getElementById("text").value,

    background_color:
      document.getElementById("bg").value,

    invert_interval:
      interval

  };

  location.href =
    "pebblejs://close#" +
    encodeURIComponent(
      JSON.stringify(settings)
    );

}

</script>

</body>
</html>
